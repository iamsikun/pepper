venue: informs
format: single-column
page_limit: 40
audience: marketing, management-science, operations

style_files:
  required:
    - informs4.cls
  optional:
    - informs4.bst

sections:
  required:
    - abstract.tex
    - introduction.tex
    - methodology.tex
    - empirics.tex
    - conclusion.tex
  optional:
    - related_work.tex
    - background.tex
    - appendix_proofs.tex
    - appendix_experiments.tex

anonymization:
  review: true
  camera_ready: false

notes:
  - "Use the appropriate document class option for your target journal"
  - "Abstract must be 200 words or fewer"
  - "5 keywords required"
  - "History block (received/revised/accepted) required for camera-ready"
  - "Download the required style file from the official venue website"
